
name: .NET Core CI

# 1. Trigger this workflow every time someone pushes to the "main" branch
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    # 2. Tell GitHub to use a virtual Linux machine
    runs-on: ubuntu-latest

    steps:
    # 3. Copy the code from your repository onto the virtual machine
    - uses: actions/checkout@v4

    # 4. Install the .NET 8 SDK on that virtual machine
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # 5. Restore any required dependencies (packages)
    - name: Restore dependencies
      run: dotnet restore

    # 6. Build/Compile the project to make sure there are no errors
    - name: Build the app
      run: dotnet build --no-restore